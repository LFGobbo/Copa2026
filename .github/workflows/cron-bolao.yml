name: Cron Bolão

on:
  # Fix 2026-07-20: torneio encerrado (Final = Jogo 104 já disputado). O agendamento de */5min
  # rodava 24h/dia pra sempre, disparando /cron?task=all (busca calendário da FIFA + recalcula
  # snapshot do ranking inteiro) mesmo sem nenhum dado novo pra sincronizar — contribuindo pra um
  # alerta de 90% do limite diário de requisições do Cloudflare. Agendamento removido; mantido só
  # workflow_dispatch (disparo manual), caso precise rodar de novo por algum motivo pontual.
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Chama cron do Worker
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "https://copa2026-bolao.luizfelipegobbo.workers.dev/cron?task=all"
