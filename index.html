<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Copa do Mundo 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08081a;--surface:#11112e;--card:#18183a;--card-hover:#1e1e44;--border:#252550;--border-light:#333368;--gold:#ffdf00;--gold-dim:rgba(255,223,0,.12);--green:#00c853;--red:#ff1744;--blue:#448aff;--orange:#ff9100;--text:#eaeaf2;--muted:#6a6a8e;--radius:10px;--radius-sm:6px;--shadow:0 8px 32px rgba(0,0,0,.5);--shadow-sm:0 2px 8px rgba(0,0,0,.3);--transition:all .2s cubic-bezier(.4,0,.2,1)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.header{position:relative;background:linear-gradient(135deg,#002776,#003d99,#009c3b,#00c853);padding:0 12px;text-align:center;display:flex;align-items:stretch;min-height:100px}
.header-bg{position:absolute;top:0;left:0;right:0;bottom:0;background-image:url("https://upload.wikimedia.org/wikipedia/commons/2/24/MetLife_Stadium_Exterior.jpg");background-size:cover;background-position:center 30%;opacity:0.07;pointer-events:none}
.header-left{position:relative;width:110px;min-width:110px;overflow:hidden;flex-shrink:0;z-index:1}
.header-left img{position:absolute;top:50%;left:52%;transform:translate(-50%,-50%);height:85%;width:auto;object-fit:contain;filter:drop-shadow(0 4px 15px rgba(0,0,0,.6))}
.header-mascots{position:relative;width:230px;min-width:230px;height:100%;flex-shrink:0;z-index:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px}
.header-mascots img{height:85%;width:auto;max-width:80px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8))}
.header-mascots img:first-child{height:95%;max-width:95px}
.header-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:16px 20px}
.header h1{font-size:28px;font-weight:900;background:linear-gradient(180deg,#fff,rgba(255,255,255,.85));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.header h1 .year{background:linear-gradient(135deg,#ffdf00,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{color:rgba(255,255,255,.7);font-size:12px;margin-top:4px}
.header-sub .dot{display:inline-block;width:3px;height:3px;background:rgba(255,255,255,.3);border-radius:50%;vertical-align:middle;margin:0 5px}
.tabs{display:flex;background:rgba(17,17,46,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:100;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:16px 24px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-size:14px;font-weight:600;color:var(--muted);transition:var(--transition);font-family:inherit;display:flex;align-items:center;gap:8px}
.tab .tab-icon{font-size:18px;opacity:.5;transition:var(--transition)}
.tab:hover{color:var(--text);background:rgba(255,255,255,.02)}
.tab:hover .tab-icon{opacity:.8}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-dim)}
.tab.active .tab-icon{opacity:1}
.content{display:none;padding:20px;max-width:1400px;margin:0 auto;animation:fadeIn .3s ease}
.content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes goalFlash{0%{background:rgba(255,223,0,.25);box-shadow:0 0 16px rgba(255,223,0,.2);transform:scale(1.08)}100%{background:rgba(0,0,0,.3);box-shadow:none;transform:scale(1)}}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:var(--transition);font-family:inherit}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.filter-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;box-shadow:0 2px 12px rgba(255,223,0,.25)}
.filter-btn.group-A{background:rgba(76,175,80,.06)}
.filter-btn.group-A:hover,.filter-btn.group-A.active{background:rgba(76,175,80,.18);border-color:#4CAF50;color:#4CAF50}
.filter-btn.group-B{background:rgba(33,150,243,.06)}
.filter-btn.group-B:hover,.filter-btn.group-B.active{background:rgba(33,150,243,.18);border-color:#2196F3;color:#2196F3}
.filter-btn.group-C{background:rgba(255,152,0,.06)}
.filter-btn.group-C:hover,.filter-btn.group-C.active{background:rgba(255,152,0,.18);border-color:#FF9800;color:#FF9800}
.filter-btn.group-D{background:rgba(233,30,99,.06)}
.filter-btn.group-D:hover,.filter-btn.group-D.active{background:rgba(233,30,99,.18);border-color:#E91E63;color:#E91E63}
.filter-btn.group-E{background:rgba(156,39,176,.06)}
.filter-btn.group-E:hover,.filter-btn.group-E.active{background:rgba(156,39,176,.18);border-color:#9C27B0;color:#9C27B0}
.filter-btn.group-F{background:rgba(0,188,212,.06)}
.filter-btn.group-F:hover,.filter-btn.group-F.active{background:rgba(0,188,212,.18);border-color:#00BCD4;color:#00BCD4}
.filter-btn.group-G{background:rgba(255,235,59,.06)}
.filter-btn.group-G:hover,.filter-btn.group-G.active{background:rgba(255,235,59,.18);border-color:#FDD835;color:#FDD835}
.filter-btn.group-H{background:rgba(255,87,34,.06)}
.filter-btn.group-H:hover,.filter-btn.group-H.active{background:rgba(255,87,34,.18);border-color:#FF5722;color:#FF5722}
.filter-btn.group-I{background:rgba(63,81,181,.06)}
.filter-btn.group-I:hover,.filter-btn.group-I.active{background:rgba(63,81,181,.18);border-color:#3F51B5;color:#3F51B5}
.filter-btn.group-J{background:rgba(205,220,57,.06)}
.filter-btn.group-J:hover,.filter-btn.group-J.active{background:rgba(205,220,57,.18);border-color:#8BC34A;color:#8BC34A}
.filter-btn.group-K{background:rgba(121,85,72,.06)}
.filter-btn.group-K:hover,.filter-btn.group-K.active{background:rgba(121,85,72,.18);border-color:#8D6E63;color:#8D6E63}
.filter-btn.group-L{background:rgba(96,125,139,.06)}
.filter-btn.group-L:hover,.filter-btn.group-L.active{background:rgba(96,125,139,.18);border-color:#78909C;color:#78909C}
.game-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:grid;grid-template-columns:28px 1fr 1fr auto 1fr;gap:4px;align-items:center;border:1px solid var(--border);transition:var(--transition);animation:slideUp .25s ease both;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.game-card.live{border-color:var(--green);box-shadow:0 0 20px rgba(0,200,83,.15)}
.game-card.live::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--green);animation:pulse 1.5s infinite}
.game-card:hover{background:var(--card-hover);border-color:var(--border-light);transform:translateY(-1px);box-shadow:var(--shadow)}
.game-num{font-size:11px;color:var(--muted);text-align:center;font-weight:600;opacity:.5}
.game-info{font-size:12px;color:var(--muted);line-height:1.5}
.game-phase{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:2px}
.game-phase.group{background:rgba(0,200,83,.12);color:var(--green)}
.game-phase.knockout{background:rgba(255,145,0,.12);color:var(--orange)}
.game-phase.final{background:rgba(255,223,0,.15);color:var(--gold)}
.game-phase.group-A{background:rgba(76,175,80,.15);color:#4CAF50}
.game-phase.group-B{background:rgba(33,150,243,.15);color:#2196F3}
.game-phase.group-C{background:rgba(255,152,0,.15);color:#FF9800}
.game-phase.group-D{background:rgba(233,30,99,.15);color:#E91E63}
.game-phase.group-E{background:rgba(156,39,176,.15);color:#9C27B0}
.game-phase.group-F{background:rgba(0,188,212,.15);color:#00BCD4}
.game-phase.group-G{background:rgba(255,235,59,.15);color:#FDD835}
.game-phase.group-H{background:rgba(255,87,34,.15);color:#FF5722}
.game-phase.group-I{background:rgba(63,81,181,.15);color:#3F51B5}
.game-phase.group-J{background:rgba(205,220,57,.15);color:#8BC34A}
.game-phase.group-K{background:rgba(121,85,72,.15);color:#8D6E63}
.game-phase.group-L{background:rgba(96,125,139,.15);color:#78909C}
.game-stadium{font-size:11px;color:var(--muted);opacity:.7}
.game-broadcast{font-size:10px;color:var(--muted);opacity:.4;display:flex;flex-wrap:wrap;gap:3px}
.br-badge{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;line-height:1.4}
.br-logo{height:11px;width:auto;border-radius:2px}
.game-score{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);justify-content:center}
.score-input{width:24px;height:26px;text-align:center;background:transparent;border:none;color:#fff;font-size:15px;font-weight:700;outline:none;-moz-appearance:textfield;font-family:inherit;transition:var(--transition);border-radius:4px}
.score-input:focus{background:rgba(255,255,255,.05);box-shadow:0 0 0 1px var(--gold)}
.score-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-x{color:var(--muted);font-weight:300}
.goal-btn{background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:11px;font-weight:500;padding:3px 8px;border-radius:var(--radius-sm);transition:var(--transition);font-family:inherit}
.goal-btn:hover{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.team-col{font-size:13px;text-align:center}
.team-row{display:flex;align-items:center;gap:6px;justify-content:center}
.flag{font-size:18px;line-height:1;display:inline-flex;align-items:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.flag-img{width:22px;height:16px;border-radius:2px;object-fit:cover;display:block}
.team-name{font-weight:500;color:var(--text)}
.team-name.brazil{color:var(--gold);font-weight:700}
.goal-events{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:3px;padding:6px 0 0;border-top:1px solid rgba(255,255,255,.04);margin-top:2px}
.goal-events:empty{display:none}
.goal-pos{font-size:9px;font-weight:700;color:var(--gold);opacity:.7;min-width:14px;text-align:center;line-height:1}
.goal-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:2px 7px;font-size:10px;color:var(--muted);animation:goalFlash 2s ease-out}
.type-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase}
.type-gol{background:rgba(0,200,83,.15);color:var(--green)}
.type-pen{background:rgba(68,138,255,.15);color:var(--blue)}
.type-falta{background:rgba(255,145,0,.15);color:var(--orange)}
.type-own{background:rgba(255,23,68,.15);color:var(--red)}
.assist-label{color:var(--muted);font-size:9px;opacity:.6}
.remove-goal{color:var(--red);cursor:pointer;font-size:11px;margin-left:3px;opacity:.4;transition:var(--transition);line-height:1}
.remove-goal:hover{opacity:1;transform:scale(1.2)}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:var(--transition);box-shadow:var(--shadow-sm)}
.group-card:hover{border-color:var(--border-light);box-shadow:var(--shadow);transform:translateY(-1px)}
.group-title{font-size:14px;font-weight:800;margin-bottom:10px;text-align:center;letter-spacing:.5px;text-transform:uppercase}
.group-title.group-A{color:#4CAF50}.group-title.group-B{color:#2196F3}.group-title.group-C{color:#FF9800}.group-title.group-D{color:#E91E63}.group-title.group-E{color:#9C27B0}.group-title.group-F{color:#00BCD4}.group-title.group-G{color:#FDD835}.group-title.group-H{color:#FF5722}.group-title.group-I{color:#3F51B5}.group-title.group-J{color:#8BC34A}.group-title.group-K{color:#8D6E63}.group-title.group-L{color:#78909C}
.group-table{width:100%;border-collapse:collapse;font-size:12px}
.group-table th{background:rgba(0,0,0,.3);padding:5px 4px;text-align:center;color:var(--muted);font-size:9px;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.group-table td{padding:4px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.025);font-size:12px}
.group-table tr:last-child td{border-bottom:none}
.pos-badge{font-size:9px;font-weight:800;width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;margin-right:4px}
.pos-1{background:rgba(0,200,83,.15);color:var(--green)}
.pos-2{background:rgba(139,195,74,.15);color:#8bc34a}
.pos-3{background:rgba(255,193,7,.12);color:#ffc107}
.pos-4{background:rgba(255,23,68,.1);color:var(--red)}
.brazil-row{background:linear-gradient(90deg,rgba(0,39,118,.1),rgba(0,156,59,.1))}
.bracket-toggle{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.bview-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;transition:var(--transition);font-family:inherit;cursor:pointer}
.bview-btn:hover{border-color:var(--gold);color:var(--gold)}
.bview-btn.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 2px 12px rgba(255,223,0,.25)}
.bracket-container{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.bracket-round{flex:1;min-width:150px;max-width:210px}
.bracket-title{font-size:11px;color:var(--gold);text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;opacity:.9}
.bracket-game{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:4px;font-size:12px;text-align:center}
.bracket-game.final-round{border-color:var(--gold);background:linear-gradient(135deg,var(--card),rgba(255,223,0,.04));box-shadow:0 0 20px rgba(255,223,0,.06)}
.bracket-team{font-weight:500;font-size:11px;display:flex;align-items:center;justify-content:center;gap:4px}
.bracket-score{font-weight:800;font-size:15px;color:var(--gold);padding:2px 0}
.bracket-tree{display:none;width:100%;overflow-x:auto}
.bracket-tree.active{display:block}
.bracket-svg{min-width:900px;width:100%;height:auto}
.scorers-table{width:100%;max-width:520px;margin:20px auto;border-collapse:collapse;font-size:13px;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.scorers-table th{background:rgba(0,0,0,.35);padding:8px 14px;text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.scorers-table td{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.025)}
.scorers-table tr:last-child td{border-bottom:none}
.rank{font-weight:800;font-size:15px;text-align:center!important;width:40px}
.rank-gold{color:#ffd700}
.rank-silver{color:#c0c0c0}
.rank-bronze{color:#cd7f32}
.third-container{max-width:650px;margin:20px auto 0}
.third-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;text-align:center}
.third-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.third-table th{background:rgba(0,0,0,.35);padding:6px 8px;text-align:center;color:var(--muted);font-size:9px;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.third-table td{padding:5px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.025);font-size:11px}
.third-qualify{color:var(--green);font-weight:700}
.third-elim{color:var(--red);opacity:.5}
.countdown-bar{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.countdown-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.countdown-time{font-size:20px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
.countdown-unit{font-size:10px;color:var(--muted);font-weight:400;margin-left:2px}
.countdown-next{font-size:11px;color:var(--muted)}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--gold);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition);font-family:inherit;flex-shrink:0;line-height:1}
.refresh-btn:hover{background:var(--gold-dim);border-color:var(--gold);transform:rotate(90deg)}
.refresh-btn:active{transform:rotate(180deg)}
.countdown-next strong{color:var(--text)}
.squads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.squad-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.squad-header{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
.squad-flag{font-size:24px;line-height:1}
.squad-team{font-size:13px;font-weight:700;color:var(--text)}
.squad-count{font-size:10px;color:var(--muted);margin-left:auto}
.squad-list{list-style:none}
.squad-player{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.02);font-size:12px}
.squad-player:hover{background:rgba(255,255,255,.02)}
.squad-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:rgba(255,255,255,.05);border-radius:4px;font-weight:700;font-size:11px;color:var(--gold);flex-shrink:0}
.squad-avatar{width:26px;height:34px;border-radius:3px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);flex-shrink:0;border:1px solid rgba(255,255,255,.05);overflow:hidden}
.squad-name{font-weight:500;color:var(--text);flex:1}
.squad-pos{font-size:9px;color:var(--muted);opacity:.6}
.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:1000;justify-content:center;align-items:center}
.popup-overlay.active{display:flex}
.popup{background:var(--surface);border:1px solid var(--border-light);border-radius:14px;padding:22px;width:94%;max-width:460px;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.6);animation:slideUp .2s ease}
.popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.popup-header h3{color:var(--gold);font-size:17px;font-weight:800}
.popup-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;transition:var(--transition);line-height:1;padding:2px}
.popup-close:hover{color:#fff;transform:rotate(90deg)}
.popup-ref{font-size:12px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.popup-team-btns{display:flex;gap:6px;margin-bottom:12px}
.pteam-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:var(--transition);font-family:inherit}
.pteam-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.pteam-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.player-btn{display:flex;align-items:center;width:100%;background:rgba(0,0,0,.2);border:1px solid var(--border);color:var(--text);padding:7px 10px;margin:2px 0;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;transition:var(--transition);font-family:inherit;gap:6px}
.player-btn:hover{background:rgba(255,255,255,.03);border-color:var(--border-light);transform:translateX(2px)}
.player-btn.selected{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);transform:translateX(4px)}
.player-btn .num{color:var(--muted);font-weight:700;min-width:22px}
.player-btn .pos-tag{font-size:10px;color:var(--muted);margin-left:auto;opacity:.6}
.goal-type-section{display:none;margin-top:12px;padding:12px;background:rgba(0,0,0,.2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.goal-type-section.visible{display:block;animation:fadeIn .2s ease}
#player-preview{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(0,0,0,.2);border-radius:var(--radius-sm)}
.type-group{margin-bottom:8px}
.type-group label{font-size:10px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;font-weight:600;letter-spacing:.5px}
.type-opts{display:flex;gap:4px;flex-wrap:wrap}
.tbtn,.abtn{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;transition:var(--transition);font-family:inherit;font-weight:500}
.tbtn:hover,.abtn:hover{border-color:var(--gold);color:var(--gold)}
.tbtn.active,.abtn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.cgoal-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--gold),#ffc107);color:#000;font-size:13px;font-weight:800;cursor:pointer;margin-top:12px;transition:var(--transition);font-family:inherit;letter-spacing:.5px}
.cgoal-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,223,0,.3)}
.cgoal-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
.rules-content{max-width:780px;margin:0 auto;font-size:13px;line-height:1.8}
.rules-content h2{color:var(--gold);font-size:18px;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:800}
.rules-content h3{color:var(--text);font-size:14px;margin:16px 0 6px;font-weight:600}
.rules-content p{color:var(--muted);margin:4px 0}
.rules-content li{color:var(--muted);margin:4px 0}
.rules-content .highlight{border-left:3px solid var(--gold);padding:12px 16px;background:rgba(0,0,0,.25);margin:12px 0;border-radius:0 8px 8px 0}
.rules-content .highlight p{color:var(--text)}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:4px;animation:pulse 1s infinite;vertical-align:middle}
.live-label{font-size:9px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:1px}
@media(max-width:768px){
  .header-left,.header-mascots{display:none}
  .header-content{padding:14px 16px}
  .header h1{font-size:22px}
  .tab{padding:12px 14px;font-size:12px}
  .game-card{grid-template-columns:1fr auto;gap:4px 6px;padding:10px}
  .game-info{grid-column:1/-1}
  .game-num{grid-column:1;grid-row:1}
  .game-score{grid-column:2;grid-row:1}
  .team-col{font-size:12px}
  .groups-grid,.squads-grid{grid-template-columns:1fr}
  .bracket-round{min-width:130px}
  .content{padding:12px}
}
@media(max-width:480px){
  .header h1{font-size:18px}
  .content{padding:10px}
  .game-card{padding:8px}
  .score-input{width:24px;height:26px;font-size:14px}
  .filter-btn{padding:4px 10px;font-size:11px}
}

</style>
</head>

function isGameLive(g){
  try{

    return now>=gd&&now<=new Date(gd.getTime()+10800000);
  }catch(e){return false}
}

function updateCountdown(){
  var el=document.getElementById("countdown-display"),ne=document.getElementById("countdown-next");
  if(!el)return;
  var now=new Date(),cs=new Date(2026,5,11,16,0,0);
  if(now<cs){
    var d=cs-now;
    el.textContent=Math.floor(d/86400000).toString().padStart(2,"0")+"d "+Math.floor((d%86400000)/3600000).toString().padStart(2,"0")+"h "+Math.floor((d%3600000)/60000).toString().padStart(2,"0")+"m "+Math.floor((d%60000)/1000).toString().padStart(2,"0")+"s";
    ne.textContent="At\u00e9 o in\u00edcio da Copa do Mundo 2026!";return;
  }
  var ng=null;
  for(var i=0;i<GAMES.length;i++){
    try{
      var g=GAMES[i],gd=gameUTC(g);if(!gd)continue;
      if(gd>now){ng=g;break}
    }catch(e){}
  }
  if(ng){
    try{
      var gd=gameUTC(ng);if(!gd)return;
      var d=gd-now;
      if(d>0){
        el.textContent=Math.floor(d/86400000).toString().padStart(2,"0")+"d "+Math.floor((d%86400000)/3600000).toString().padStart(2,"0")+"h "+Math.floor((d%3600000)/60000).toString().padStart(2,"0")+"m "+Math.floor((d%60000)/1000).toString().padStart(2,"0")+"s";
        ne.innerHTML='Pr\u00f3ximo: <strong>#'+ng.n+' '+ng.a+' vs '+ng.b+'</strong> ('+ng.d+' '+ng.t+')';
      }
    }catch(e){}
  }else{el.textContent="\u{1F3C6} Copa encerrada!";ne.textContent="Brasil campe\u00e3o! \u{1F947}"}
}

var FIFA_URL="https://api.fifa.com/api/v3/calendar/matches?idCompetition=17&idSeason=285023&count=200";

function fetchFifaScores(t){var ac=new AbortController(),to=setTimeout(function(){ac.abort()},t||10000);
return fetch(FIFA_URL,{cache:"no-store",signal:ac.signal}).then(function(r){clearTimeout(to);return r.json()}).then(function(d){
var map={};if(!d||!d.Results)return map;
d.Results.forEach(function(m){var h=FIFA_TEAM_MAP[m.Home.Abbreviation],a=FIFA_TEAM_MAP[m.Away.Abbreviation],hs=m.HomeTeamScore,as=m.AwayTeamScore;
if(!h||!a||hs===null||as===null)return;
for(var i=0;i<GAMES.length;i++){var g=GAMES[i];
if((g.a===h&&g.b===a)||(g.a===a&&g.b===h)){map[g.n]={};if(g.a===h){map[g.n].a=hs;map[g.n].b=as}else{map[g.n].a=as;map[g.n].b=hs}break}}
});return map})["catch"](function(){return null})}

function mergeScores(map){if(!map||Object.keys(map).length===0)return false;var changed=false;
Object.keys(map).forEach(function(id){var s=map[id],na=parseInt(s.a),nb=parseInt(s.b);if(isNaN(na)||isNaN(nb))return;
if(!scores[id])scores[id]={};if(scores[id].a!==na||scores[id].b!==nb)changed=true;scores[id].a=na;scores[id].b=nb});
if(changed){saveState();renderGames(currentFilter);renderGroups();renderBracket();renderScorers()}return changed}

// --- Botão de atualização manual ---
document.getElementById("refresh-btn").addEventListener("click",function(){
  var btn=this;btn.textContent="\u23F3";
  btn.style.transform="rotate(360deg)";
  fetchFifaScores().then(function(map){mergeScores(map);btn.style.transform="";setTimeout(function(){btn.style.transform=""},300);setTimeout(function(){btn.textContent="\u27F3"},1500)})
  .catch(function(){btn.style.transform="";btn.style.color="var(--red)";setTimeout(function(){btn.style.color=""},1500);btn.textContent="\u26A0"})
});

// --- Polling automático da FIFA API (a cada 30s, timeout 8s) ---
(function(){setInterval(function(){fetchFifaScores(8000).then(function(m){if(m)mergeScores(m)})},30000)})();


</script>
